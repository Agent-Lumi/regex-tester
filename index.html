<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💡 regex-tester</h1>
        <p class="subtitle">Test and debug regular expressions with explanations</p>
        
        <div class="tool-box">
            <textarea id="input" placeholder="Enter your text here..."></textarea>
            <div class="options">
                <label>
                    <input type="checkbox" id="option1"> Option 1
                </label>
            </div>
            <button onclick="process()">Process</button>
            <div id="result" class="result"></div>
            <button onclick="copy()" class="secondary">Copy Result</button>
        </div>
        
        <footer>
            Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
<script>
// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
        switch(e.key) {
            case 's': e.preventDefault(); console.log('Save shortcut'); break;
            case 'r': e.preventDefault(); location.reload(); break;
            case 'f': e.preventDefault(); document.querySelector('input')?.focus(); break;
        }
    }
});
</script>
<script>
// Dark mode toggle
const darkModeToggle = document.createElement('button');
darkModeToggle.textContent = '🌙';
darkModeToggle.style.cssText = 'position:fixed;top:20px;right:20px;background:none;border:none;font-size:24px;cursor:pointer;z-index:1000;';
darkModeToggle.onclick = () => {
    document.body.classList.toggle('dark-mode');
    darkModeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
};
document.body.appendChild(darkModeToggle);

// Check saved preference
if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
    darkModeToggle.textContent = '☀️';
}
</script>
<style>
.dark-mode { background: #1a1a1a !important; color: #e0e0e0 !important; }
.dark-mode .container { background: #2a2a2a !important; }
</style>
<script>
// Import from file
const importBtn = document.createElement('button');
importBtn.textContent = '📁 Import';
importBtn.onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const textArea = document.querySelector('textarea');
            if (textArea) textArea.value = e.target.result;
        };
        reader.readAsText(file);
    };
    input.click();
};
document.querySelector('.container')?.appendChild(importBtn);
</script>
<script>
// Usage stats
const stats = JSON.parse(localStorage.getItem('app-stats') || '{}');
stats.visits = (stats.visits || 0) + 1;
stats.lastVisit = new Date().toISOString();
localStorage.setItem('app-stats', JSON.stringify(stats));
console.log('Visits:', stats.visits);
</script>

<script>
// Undo/Redo history
const history = { past: [], future: [] };
const saveState = () => {
    const state = document.querySelector('textarea, input')?.value;
    if (state) history.past.push(state);
};
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        if (e.shiftKey && history.future.length) {
            // Redo
            const state = history.future.pop();
            history.past.push(document.querySelector('textarea, input')?.value);
            if (document.querySelector('textarea, input')) document.querySelector('textarea, input').value = state;
        } else if (history.past.length) {
            // Undo
            const state = history.past.pop();
            history.future.push(document.querySelector('textarea, input')?.value);
            if (document.querySelector('textarea, input')) document.querySelector('textarea, input').value = state;
        }
    }
});
document.addEventListener('input', saveState);
</script>

<script>
// Auto-save to localStorage
const saveKey = 'app-data-' + location.pathname;
const saveData = () => {
    const data = { timestamp: Date.now(), inputs: {} };
    document.querySelectorAll('input, textarea').forEach(el => {
        data.inputs[el.id || el.name] = el.value;
    });
    localStorage.setItem(saveKey, JSON.stringify(data));
};
const loadData = () => {
    const saved = localStorage.getItem(saveKey);
    if (saved) {
        const data = JSON.parse(saved);
        Object.entries(data.inputs).forEach(([key, value]) => {
            const el = document.getElementById(key) || document.querySelector('[name="' + key + '"]');
            if (el) el.value = value;
        });
    }
};
document.addEventListener('input', saveData);
document.addEventListener('DOMContentLoaded', loadData);
</script>

<script>
// Export functionality
function exportData(format) {
    const data = document.querySelector('textarea, input')?.value || document.body.innerText;
    const blob = new Blob([data], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'export.' + format;
    a.click();
    URL.revokeObjectURL(url);
}
</script>

<script>
// Templates gallery
const templates = [
    { name: 'Default', apply: () => {} },
    { name: 'Minimal', apply: () => document.body.style.fontFamily = 'system-ui, sans-serif' }
];
const templateSelect = document.createElement('select');
templates.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = t.name;
    templateSelect.appendChild(opt);
});
templateSelect.onchange = (e) => {
    const template = templates.find(t => t.name === e.target.value);
    if (template) template.apply();
};
document.querySelector('.container')?.appendChild(templateSelect);
</script>
